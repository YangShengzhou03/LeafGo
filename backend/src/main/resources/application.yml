spring:
  application:
    name: leafgo-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/leafgo?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8081

jwt:
  secret: LeafGoSecretKeyForJWTTokenGeneration2024
  expiration: 86400000
