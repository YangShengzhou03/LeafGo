spring:
  datasource:
    url: jdbc:mysql://prod-db-server:3306/leafgo?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
