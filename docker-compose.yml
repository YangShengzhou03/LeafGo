version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: leafgo-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: leaf_go
      MYSQL_USER: leaf_go
      MYSQL_PASSWORD: leaf_go123
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql
    networks:
      - leafgo-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leafgo-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/leaf_go?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: leaf_go
      SPRING_DATASOURCE_PASSWORD: leaf_go123
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRATION: 86400000
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - leafgo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leafgo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - leafgo-network

volumes:
  mariadb_data:
    driver: local

networks:
  leafgo-network:
    driver: bridge
